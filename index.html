<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Libretto">
<title>Libretto</title>
<style>
  :root{
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', 'Courier New', Courier, monospace;
    --paper: #FAF6EE;
    --paper-alt: #F1EBDD;
    --ink: #22281F;
    --ink-soft: #5A5E52;
    --rule: #DCD4BE;
    --entrata: #3B7A57;
    --entrata-bg: #E7F0E7;
    --uscita: #B5533C;
    --uscita-bg: #F5E7E1;
    --gold: #B8975A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    padding-bottom: 40px;
    padding-top: env(safe-area-inset-top);
  }
  .wrap{
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 20px 20px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
  }
  header h1{
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin:0;
  }
  header .data{
    font-size: 12px;
    color: var(--ink-soft);
    text-transform: capitalize;
  }
  .saldo-card{
    background: var(--ink);
    color: var(--paper);
    border-radius: 14px;
    padding: 22px 22px 20px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .saldo-card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height: 3px;
    background: linear-gradient(90deg, var(--entrata), var(--gold) 50%, var(--uscita));
  }
  .saldo-label{
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #C9C4B4;
    margin-bottom: 6px;
  }
  .saldo-val{
    font-family: var(--font-mono);
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
  }
  .saldo-sub{
    display:flex;
    gap: 18px;
    margin-top: 14px;
    font-size: 12px;
    color: #C9C4B4;
  }
  .saldo-sub b{
    font-family: var(--font-mono);
    display:block;
    font-size: 14px;
    margin-top: 2px;
  }
  .saldo-sub .in b{ color: #8FCB9F; }
  .saldo-sub .out b{ color: #E8A28F; }

  .conti{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .conto-card{
    background: var(--paper-alt);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 10px 8px;
    text-align:center;
  }
  .conto-card .nome{
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    border:none;
    background:none;
    width:100%;
    text-align:center;
    padding: 0;
    margin-bottom: 4px;
    font-family: var(--font-body);
    font-weight:600;
  }
  .conto-card .nome:focus{ outline: 1px solid var(--gold); border-radius: 4px; }
  .conto-card .val{
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
  }

  .form-card{
    background: var(--paper-alt);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 22px;
  }
  .toggle{
    display:flex;
    background: var(--paper);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 12px;
    border: 1px solid var(--rule);
  }
  .toggle button{
    flex:1;
    padding: 9px 0;
    border:none;
    background: transparent;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    border-radius: 7px;
    color: var(--ink-soft);
    cursor:pointer;
    transition: all .15s ease;
  }
  .toggle button.active.in{ background: var(--entrata-bg); color: var(--entrata); }
  .toggle button.active.out{ background: var(--uscita-bg); color: var(--uscita); }

  .row{ display:flex; gap:10px; margin-bottom:10px; }
  input, select{
    width:100%;
    font-family: var(--font-body);
    font-size: 16px;
    padding: 11px 12px;
    border-radius: 9px;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
  }
  input:focus, select:focus, button:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 1px;
  }
  input.amount{
    font-family: var(--font-mono);
    font-weight:700;
  }
  .add-btn{
    width:100%;
    padding: 12px;
    border-radius: 9px;
    border: none;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    cursor:pointer;
    margin-top: 2px;
  }
  .add-btn:active{ opacity: 0.85; }

  .lista h2{
    font-family: var(--font-display);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 0 0 10px 2px;
  }
  .giorno{ margin-bottom: 16px; }
  .giorno-label{
    font-size: 11px;
    color: var(--ink-soft);
    text-transform: capitalize;
    margin: 0 0 6px 2px;
  }
  .voce{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 12px 4px;
    border-bottom: 1px dashed var(--rule);
    gap: 10px;
  }
  .voce .desc{ font-size: 14px; font-weight: 500; }
  .voce .cat{ font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .voce .val{
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 15px;
    white-space: nowrap;
  }
  .voce .val.in{ color: var(--entrata); }
  .voce .val.out{ color: var(--uscita); }
  .voce .del{
    background:none; border:none; color: var(--ink-soft);
    font-size: 16px; cursor:pointer; padding: 4px 6px; line-height:1;
  }
  .vuoto{
    text-align:center; padding: 30px 10px;
    color: var(--ink-soft); font-size: 13px; font-style: italic;
  }

  .backup{
    display:flex; gap:10px; margin-top: 26px;
    padding-top: 18px; border-top: 1px solid var(--rule);
  }
  .backup button{
    flex:1; padding: 10px; border-radius: 9px;
    border: 1px solid var(--rule); background: var(--paper-alt);
    color: var(--ink); font-family: var(--font-body);
    font-weight: 600; font-size: 13px; cursor:pointer;
  }
  .backup button:active{ opacity: 0.8; }
  .toast{
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 10px 18px;
    border-radius: 20px; font-size: 13px; opacity: 0;
    transition: opacity .3s ease; pointer-events:none; z-index: 10;
  }
  .toast.show{ opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Il mio libretto</h1>
    <div class="data" id="dataOggi"></div>
  </header>

  <div class="saldo-card">
    <div class="saldo-label">Saldo</div>
    <div class="saldo-val" id="saldoVal">€ 0,00</div>
    <div class="saldo-sub">
      <div class="in">Entrate<b id="totEntrate">€ 0</b></div>
      <div class="out">Uscite<b id="totUscite">€ 0</b></div>
    </div>
  </div>

  <div class="conti" id="contiCards"></div>

  <div class="form-card">
    <div class="toggle">
      <button type="button" id="btnIn" class="active in">Entrata</button>
      <button type="button" id="btnOut" class="out">Uscita</button>
    </div>
    <div class="row">
      <select id="conto"></select>
    </div>
    <div class="row">
      <input type="number" id="amount" class="amount" placeholder="0,00" inputmode="decimal" step="0.01">
    </div>
    <div class="row">
      <input type="text" id="desc" placeholder="Descrizione (es. Spesa, Stipendio...)">
    </div>
    <div class="row">
      <select id="cat">
        <option>Generale</option>
        <option>Stipendio</option>
        <option>Spesa</option>
        <option>Bollette</option>
        <option>Trasporti</option>
        <option>Svago</option>
        <option>Casa</option>
        <option>Salute</option>
        <option>Altro</option>
        <option>Investimento</option>
      </select>
    </div>
    <button class="add-btn" id="addBtn">Aggiungi voce</button>
  </div>

  <div class="lista">
    <h2>Movimenti</h2>
    <div id="listaVoci"></div>
  </div>

  <div class="backup">
    <button id="exportBtn">Esporta backup</button>
    <button id="importBtn">Importa backup</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'libretto-data-v1';

var tipo = 'in';
var transazioni = [];
var conti = [
  { id: 'b1', nome: 'Banca 1' },
  { id: 'b2', nome: 'Banca 2' },
  { id: 'inv', nome: 'Fondo investimento' }
];

function $(id){ return document.getElementById(id); }

$('dataOggi').textContent = new Date().toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long' });

$('btnIn').onclick = function(){ tipo='in'; $('btnIn').classList.add('active'); $('btnOut').classList.remove('active'); };
$('btnOut').onclick = function(){ tipo='out'; $('btnOut').classList.add('active'); $('btnIn').classList.remove('active'); };

function fmt(n){
  return '€ ' + n.toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtGiorno(iso){
  return new Date(iso).toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'});
}
function saldoConto(contoId){
  return transazioni.filter(function(t){ return t.contoId === contoId; })
    .reduce(function(s,t){ return s + (t.tipo==='in' ? t.importo : -t.importo); }, 0);
}

function toast(msg){
  var el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

function load(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var d = JSON.parse(raw);
      transazioni = d.transazioni || [];
      conti = d.conti || conti;
    }
  }catch(e){}
  renderConti();
  render();
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ transazioni: transazioni, conti: conti }));
  }catch(e){
    toast('Errore nel salvataggio');
  }
}

function renderConti(){
  var html = '';
  for(var i=0;i<conti.length;i++){
    var c = conti[i];
    html += '<div class="conto-card">'
      + '<input class="nome" data-id="'+c.id+'" value="'+c.nome.replace(/"/g,'&quot;')+'">'
      + '<div class="val">'+fmt(saldoConto(c.id))+'</div></div>';
  }
  $('contiCards').innerHTML = html;
  var inputs = $('contiCards').querySelectorAll('.nome');
  for(var j=0;j<inputs.length;j++){
    inputs[j].onchange = function(){
      var self = this;
      for(var k=0;k<conti.length;k++){
        if(conti[k].id === self.dataset.id){
          conti[k].nome = self.value.trim() || conti[k].nome;
        }
      }
      save(); renderConti(); renderSelectConti();
    };
  }
  renderSelectConti();
}

function renderSelectConti(){
  var sel = $('conto');
  var prev = sel.value;
  var html = '';
  for(var i=0;i<conti.length;i++){
    html += '<option value="'+conti[i].id+'">'+conti[i].nome+'</option>';
  }
  sel.innerHTML = html;
  for(var k=0;k<conti.length;k++){ if(conti[k].id === prev) sel.value = prev; }
}

function nomeConto(id){
  for(var i=0;i<conti.length;i++){ if(conti[i].id === id) return conti[i].nome; }
  return '—';
}

function render(){
  var entrate = 0, uscite = 0;
  for(var i=0;i<transazioni.length;i++){
    if(transazioni[i].tipo === 'in') entrate += transazioni[i].importo;
    else uscite += transazioni[i].importo;
  }
  var saldo = entrate - uscite;
  $('saldoVal').textContent = fmt(saldo);
  $('saldoVal').style.color = saldo < 0 ? '#E8A28F' : '#FAF6EE';
  $('totEntrate').textContent = fmt(entrate);
  $('totUscite').textContent = fmt(uscite);

  var lista = $('listaVoci');
  if(transazioni.length === 0){
    lista.innerHTML = '<div class="vuoto">Ancora nessun movimento. Aggiungi la tua prima voce qui sopra.</div>';
    return;
  }

  var ordinati = transazioni.slice().sort(function(a,b){ return new Date(b.data) - new Date(a.data); });
  var gruppi = {};
  var ordineChiavi = [];
  for(var n=0;n<ordinati.length;n++){
    var key = ordinati[n].data.slice(0,10);
    if(!gruppi[key]){ gruppi[key] = []; ordineChiavi.push(key); }
    gruppi[key].push(ordinati[n]);
  }

  var html = '';
  for(var g=0;g<ordineChiavi.length;g++){
    var k = ordineChiavi[g];
    html += '<div class="giorno"><div class="giorno-label">'+fmtGiorno(k)+'</div>';
    for(var v=0;v<gruppi[k].length;v++){
      var t = gruppi[k][v];
      html += '<div class="voce"><div>'
        + '<div class="desc">'+t.desc+'</div>'
        + '<div class="cat">'+nomeConto(t.contoId)+' · '+t.cat+'</div></div>'
        + '<div style="display:flex;align-items:center;gap:8px;">'
        + '<div class="val '+t.tipo+'">'+(t.tipo==='in'?'+':'-')+' '+fmt(t.importo)+'</div>'
        + '<button class="del" data-id="'+t.id+'" aria-label="Elimina">✕</button></div></div>';
    }
    html += '</div>';
  }
  lista.innerHTML = html;

  var dels = lista.querySelectorAll('.del');
  for(var d=0;d<dels.length;d++){
    dels[d].onclick = function(){
      var id = this.dataset.id;
      transazioni = transazioni.filter(function(x){ return x.id !== id; });
      save(); renderConti(); render();
    };
  }
}

$('addBtn').onclick = function(){
  var importo = parseFloat($('amount').value.replace(',', '.'));
  var desc = $('desc').value.trim() || (tipo==='in' ? 'Entrata' : 'Uscita');
  if(!importo || importo <= 0){ $('amount').focus(); return; }
  transazioni.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    tipo: tipo,
    importo: importo,
    desc: desc,
    cat: $('cat').value,
    contoId: $('conto').value,
    data: new Date().toISOString()
  });
  $('amount').value = '';
  $('desc').value = '';
  save(); renderConti(); render();
};

$('exportBtn').onclick = function(){
  var dati = JSON.stringify({ transazioni: transazioni, conti: conti }, null, 2);
  var blob = new Blob([dati], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var oggi = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'libretto-backup-' + oggi + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Backup esportato');
};

$('importBtn').onclick = function(){ $('importFile').click(); };
$('importFile').onchange = function(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var d = JSON.parse(ev.target.result);
      if(d.transazioni){ transazioni = d.transazioni; }
      if(d.conti){ conti = d.conti; }
      save(); renderConti(); render();
      toast('Backup importato');
    }catch(err){
      toast('File non valido');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

load();
</script>
</body>
</html>
